<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fruits App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h2>Fruits</h2>

        <select id="fruitFilter" onchange="filterFruits()">
            <option value="">All Types</option>
            <option value="Alkaline">Alkaline</option>
            <option value="Acidic">Acidic</option>
        </select>

        <input type="text" id="search" placeholder="Search...">

        <div id="fruitList"></div>
    </div>

    <div class="right">

        <h2 id="emptyState">Please choose a fruit</h2>

        <div id="fruitDetails" style="display:none;">

            <h2 id="fruitName"></h2>
            <img id="fruitImage" width="150">
            <p id="fruitDesc"></p>

            <div class="tabs">
                <button onclick="showTab('supplier')">Supplier Info</button>
                <button onclick="showTab('more')">More Data</button>
            </div>

            <div id="supplier" class="tab-content">

                <select id="cityFilter" onchange="filterTable()">
                    <option value="">All Cities</option>
                    <option value="Cairo">Cairo</option>
                    <option value="Giza">Giza</option>
                    <option value="Alexandria">Alexandria</option>
                    <option value="Aswan">Aswan</option>
                    <option value="Shohag">Shohag</option>
                </select>

                <button onclick="sortTable('name')">Sort by Name</button>
                <button onclick="sortTable('since')">Sort by Since</button>

                <br><br>

                <table border="1" width="100%">
                    <thead>
                        <tr>
                            <th>Supplier</th>
                            <th>Since</th>
                            <th>City</th>
                            <th>Contact</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody id="supplierTable"></tbody>
                </table>

                <button onclick="saveData()">Save</button>
                <button onclick="cancelData()">Cancel</button>
            </div>

            <div id="more" class="tab-content" style="display:none;">
                <p id="moreData"></p>
            </div>

        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
